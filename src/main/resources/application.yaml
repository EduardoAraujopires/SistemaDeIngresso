spring:
  application:
    name: ingressos

  # Banco de dados PostgreSQL
  datasource:
    url: jdbc:postgresql://localhost:5432/ingressos
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  # JPA Configuration
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    database-platform: org.hibernate.dialect.PostgreSQLDialect

 #Logging Configuration (FORA do spring!)
logging:
  level:
    io.github.EduardoAraujoPires: DEBUG
    org.springframework: INFO
    org.hibernate: WARN
    org.hibernate.SQL: DEBUG
  file:
    name: logs/sistema-ingressos.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level - %msg%n"

# Server Configuration
server:
  port: 8080
